name: CI/CD

on:
  push:
    branches: [master, develop, "feature/**"]
  pull_request:
    branches: [develop, master]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore FitLife.Classes.slnx

      - name: Build
        run: dotnet build FitLife.Classes.slnx --no-restore

      - name: Test
        run: dotnet test FitLife.Classes.Tests/FitLife.Classes.Tests.csproj --no-restore --no-build
